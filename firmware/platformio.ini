[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = waveshare_esp32s3_touch_lcd_7b
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
extra_scripts = pre:load_env.py
lib_deps =
    bblanchon/ArduinoJson@^7
    lvgl/lvgl@^8.4.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_CONF_INCLUDE_SIMPLE
    -Isrc
; TODO: Enable custom_sdkconfig once pioarduino cert-generation and
; __wrap_log_printf linker issues are resolved. The pre-compiled framework
; runs OPI PSRAM in Quad mode (half bandwidth). Correct settings:
;   CONFIG_SPIRAM_MODE_OCT=y, CONFIG_SPIRAM_XIP_FROM_PSRAM=y,
;   CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y, CONFIG_LCD_RGB_ISR_IRAM_SAFE=y,
;   CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=n

[env:cti_test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = waveshare_esp32s3_touch_lcd_7b
framework = arduino
monitor_speed = 115200
build_src_filter = +<protocols/cti.cpp> +<devices/serial_device.cpp> +<cti_bench_test.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCTI_BENCH_TEST
lib_deps =
    bblanchon/ArduinoJson@^7

[env:native]
platform = native
lib_deps =
    bblanchon/ArduinoJson@^7
test_framework = unity
test_build_src = true
build_src_filter = +<*> -<network/> -<main.cpp> -<display/>
build_flags =
    -DUNITY_INCLUDE_DOUBLE
    -Isrc
